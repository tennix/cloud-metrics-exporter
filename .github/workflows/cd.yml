name: CD

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish-image:
    runs-on: ubuntu-latest

    env:
      SHOULD_PUSH: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest,enable=${{ env.SHOULD_PUSH }}
          labels: |
            org.opencontainers.image.title=cloud-metrics-exporter
            org.opencontainers.image.description=Kubernetes cloud metrics exporter with Prometheus output
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ env.SHOULD_PUSH }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish summary
        run: |
          {
            echo "## Published image"
            echo
            echo "- Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
            echo "- Tags:"
            echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- /'
            echo "- Platforms: linux/amd64, linux/arm64"
            echo "- Pushed: ${{ env.SHOULD_PUSH }}"
            echo "- Digest: ${{ steps.push.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"
