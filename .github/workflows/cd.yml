name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  verify:
    uses: ./.github/workflows/_verify.yml

  publish-image:
    needs: verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux binary
        run: |
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/cloud-metrics-exporter ./cmd/cloud-metrics-exporter

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cloud-metrics-exporter
          tags: |
            type=raw,value=${{ steps.vars.outputs.short_sha }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Publish summary
        run: |
          {
            echo "## Published image"
            echo
            echo "- Image: ghcr.io/${{ github.repository_owner }}/cloud-metrics-exporter"
            echo "- Tag: ${{ steps.vars.outputs.short_sha }}"
            echo "- Digest: ${{ steps.push.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"
